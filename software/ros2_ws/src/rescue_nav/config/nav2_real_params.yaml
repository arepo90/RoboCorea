# Nav2 parameters for the RoboCorea tracked skid-steer base — REAL ROBOT.
#
# Differences vs. config/nav2_params.yaml (the sim/PoC file):
#   * use_sim_time: FALSE everywhere (wall clock on hardware).
#   * Adds amcl + map_server so the KNOWN-MAP path can run AMCL localization
#     (localization:=amcl in real_navigation.launch.py). The slam_toolbox path
#     ignores these two sections.
#   * Odometry source is the FUSED estimate: /odometry/filtered (EKF output),
#     not the raw /odom.
#
# Shared with sim by design (the frame contract is identical):
#   robot_base_frame: base_footprint
#   laser observations: /scan_flat (base_laser frame)
#   RegulatedPurePursuitController (smooth for differential/tracked drive)
#
# FOOTPRINT (rectangle, tracked platform — NOT a circle): 0.74 x 0.53 m, i.e.
# half-extents [0.37, 0.265]. This matches the chassis box vetted in the sim
# (config/nav2_params.yaml, "excludes flipper arms"). It MUST stay wider than the
# drivetrain: the esp32_bridge track separation is track_width_m = 0.455 m, so any
# half-width < 0.2275 (e.g. the previous 0.20) is physically impossible and makes
# Nav2 under-estimate the robot width — a collision risk in tight rescue passages.
# Bench TODO: measure the real chassis L x W and set both costmap footprints to it
# (keep width >= track_width_m + a margin); then tune inflation/speeds/gains.
#
# Velocity/accel limits are conservative for a ~23 kg tracked rescue robot.

# ── Localization: AMCL (Adaptive Monte Carlo Localization) ──────────────────
# Owns map -> odom when localization:=amcl. Slamtec A1 likelihood-field model.
amcl:
  ros__parameters:
    use_sim_time: false
    scan_topic: /scan_flat
    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    # Particle filter
    min_particles: 500
    max_particles: 3000
    # Odometry noise model (tracked skid-steer: higher rotational noise)
    alpha1: 0.25   # rot noise from rot
    alpha2: 0.25   # rot noise from trans
    alpha3: 0.20   # trans noise from trans
    alpha4: 0.20   # trans noise from rot
    alpha5: 0.10   # strafe (unused for diff drive)
    # Sensor model — Slamtec A1 range model (0.1 .. 12 m)
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_min_range: 0.1
    laser_max_range: 12.0
    max_beams: 60
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.45
    z_short: 0.0
    sigma_hit: 0.2
    lambda_short: 0.1
    # Update / resample thresholds
    update_min_d: 0.20
    update_min_a: 0.15
    resample_interval: 1
    transform_tolerance: 1.0
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.10
    pf_err: 0.05
    pf_z: 0.99
    save_pose_rate: 0.5
    tf_broadcast: true
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    # Initial pose. real_navigation.launch.py also republishes /initialpose once
    # (set_initial_pose arg); this is the fallback if that is disabled.
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

# ── Map server (loads the saved <map>.yaml; path injected by the launch) ─────
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""        # overridden by real_navigation.launch.py 'map' arg

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 10.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65

# ── Navigation stack ────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.35
      lookahead_dist: 0.5
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.2
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.6
      regulated_linear_scaling_min_speed: 0.1
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 2.5
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      # 0.74 x 0.53 m chassis box (see header). Must exceed track_width_m=0.455.
      footprint: "[[0.37, 0.265], [0.37, -0.265], [-0.37, -0.265], [-0.37, 0.265]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_flat
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          obstacle_max_range: 10.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      track_unknown_space: true
      # 0.74 x 0.53 m chassis box (see header). Must exceed track_width_m=0.455.
      footprint: "[[0.37, 0.265], [0.37, -0.265], [-0.37, -0.265], [-0.37, 0.265]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_flat
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          obstacle_max_range: 10.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 1000

# velocity_smoother publishes the FINAL /cmd_vel that esp32_bridge consumes
# (when launched with enable_cmd_vel_drive:=true) and forwards to the VESCs.
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.5]
    min_velocity: [-0.5, 0.0, -1.5]
    max_accel: [2.0, 0.0, 3.2]
    max_decel: [-2.0, 0.0, -3.2]
    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
