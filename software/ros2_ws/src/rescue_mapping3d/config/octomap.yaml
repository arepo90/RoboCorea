octomap_node:
  ros__parameters:
    # The ZED2 registered cloud, consumed LOCALLY on the Jetson. Do NOT subscribe
    # to this from the workstation — only /robot/map3d (the octree) should cross.
    cloud_topic: /zed/zed_node/point_cloud/cloud_registered
    target_frame: map          # octree is built + published in the map frame
    resolution: 0.10           # octree leaf size (m); 0.05–0.10 for a rescue arena
    leaf_size: 0.05            # pre-insert voxel downsample (m)
    min_range: 0.3             # ignore points closer than this (m)
    max_range: 5.0             # ignore/raycast-limit beyond this (ZED noisy far out)
    insert_period: 0.2         # cap point-cloud insertion to <= 5 Hz (CPU guard)
    publish_period: 1.0        # publish the binary octree at this period (s)
    prob_hit: 0.7
    prob_miss: 0.4
    clamp_min: 0.12
    clamp_max: 0.97
