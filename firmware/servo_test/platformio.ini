; RoboCorea — standalone servo bench test (NOT the robot firmware).
; Sweeps a JX CLS-12V7346 coreless servo 0<->180 deg on GPIO26.
;
; This is a throwaway bring-up sketch, intentionally separate from
; firmware/ESP so it never enters the real CAN/VESC build. The robot's
; drivetrain has no PWM servos — see reference/architecture.md.
;
;   pio run -t upload      # flash
;   pio device monitor     # serial log @ 115200
;
; Power the servo from 11.1-15V on its own supply; common-ground it with the
; ESP32. The ESP32 only drives the 3.3V signal wire on GPIO26.

[env:esp32doit-devkit-v1]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

board_build.f_cpu = 240000000L

monitor_speed = 115200

; Exact pulse-width control (500-2500us) regardless of core version.
lib_deps =
    madhephaestus/ESP32Servo @ ^3.0.5
