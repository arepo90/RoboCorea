; RoboCorea — ESP32 firmware
; DOIT ESP32 DevKit V1 (custom PCB). Arduino framework, both cores @ 240 MHz.

[env:esp32doit-devkit-v1]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

board_build.f_cpu = 240000000L

; The binary protocol uses UART0 @ 921600 (same as the USB cable). The monitor
; only sees text output when ENABLE_COMMS is off in config.h.
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    ; QMC5883L (GY-271 mag) is a raw Wire driver in lib/Sensors — no library.
    adafruit/Adafruit MLX90640 @ ^1.1.1
    adafruit/Adafruit BusIO @ ^1.14.1
    ; Default CAN backend (CAN_BACKEND_TWAI) uses the ESP32 built-in TWAI driver
    ; (driver/twai.h) — no library needed. The line below is only compiled when
    ; CAN_BACKEND_MCP2515 is selected in config.h.
    autowp/autowp-mcp2515 @ ^1.2.1

; Expose include/ (config.h, robot_types.h) to every lib build.
build_flags =
    -I"${PROJECT_INCLUDE_DIR}"
    -DCORE_DEBUG_LEVEL=0
